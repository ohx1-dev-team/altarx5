<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AltaRx5</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h2>AltaRx5</h2>

  <!-- ================= JOIN / CREATE ROOM SCREEN ================= -->
  <div id="joinScreen">
    <p><input id="name" placeholder="Username" /></p>
    <p><input id="code" placeholder="6-digit Code" /></p>
    <button id="createBtn">Create Room</button>
    <button id="joinBtn">Join Room</button>
    <p><a href="about.html">About</a></p>
    <p id="info"></p>
  </div>

  <!-- ================= CHAT SCREEN ================= -->
  <div id="chatScreen" style="display: none;">
    <div id="chatUI">
      <div id="chat"></div>
      <input id="message" placeholder="Message goes HERE" />
      <button id="sendBtn">Send</button>
      <p>Room Code: <span id="roomCodeDisplay"></span></p>
    </div>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
